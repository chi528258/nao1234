<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無料数秘術占い</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(to bottom,#7dd3fc,#38bdf8);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:white;
    width:90%;
    max-width:700px;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    color:#7e3af2;
    font-size:48px;
}

input{
    width:90px;
    padding:12px;
    font-size:24px;
    text-align:center;
    margin:5px;
}

button{
    margin-top:20px;
    padding:15px 40px;
    border:none;
    border-radius:10px;
    background:#7e3af2;
    color:white;
    font-size:22px;
    cursor:pointer;
}

button:hover{
    background:#6d28d9;
}

#result{
    margin-top:30px;
    background:#f8f8f8;
    padding:25px;
    border-radius:15px;
}

h2{
    font-size:40px;
}

h3{
    color:#7e3af2;
    margin-top:25px;
}

@media(max-width:600px){

    h1{
        font-size:32px;
    }

    input{
        width:70px;
        font-size:20px;
    }

    h2{
        font-size:30px;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>🔮無料数秘術占い🔮</h1>

<p>生年月日を入力してください</p>

<input type="number" id="year" placeholder="1990">年

<input type="number" id="month" placeholder="5">月

<input type="number" id="day" placeholder="15">日

<br>

<button onclick="fortune()">占う</button>

<div id="result"></div>

</div>

<script>

function fortune(){

let year = document.getElementById("year").value;
let month = document.getElementById("month").value;
let day = document.getElementById("day").value;

if(year === "" || month === "" || day === ""){
    alert("生年月日を入力してください");
    return;
}

let numbers = year + month + day;

let sum = 0;

for(let i=0;i<numbers.length;i++){
    sum += Number(numbers[i]);
}

while(sum > 9){

    let temp = 0;
    let str = String(sum);

    for(let i=0;i<str.length;i++){
        temp += Number(str[i]);
    }

    sum = temp;
}

let message="";
let love="";
let work="";

switch(sum){

case 1:
message="リーダー気質。新しい道を切り開く力があります。";
love="好きになると一直線。情熱的な恋愛をします。";
work="責任感が強くリーダーとして活躍します。";
break;

case 2:
message="思いやりがあり、人との調和を大切にします。";
love="優しく相手を支える恋愛タイプです。";
work="協調性が高くチームで力を発揮します。";
break;

case 3:
message="創造力が豊かで、人を楽しませる才能があります。";
love="明るく楽しい恋愛を好みます。";
work="企画やクリエイティブ分野に向いています。";
break;

case 4:
message="努力家でコツコツ積み上げる力があります。";
love="一途で誠実な恋愛をします。";
work="着実に成果を出す堅実派です。";
break;

case 5:
message="自由を愛し、変化を楽しめるタイプです。";
love="刺激的な恋愛を好みます。";
work="行動力があり挑戦を恐れません。";
break;

case 6:
message="愛情深く、人を支えることが得意です。";
love="家庭的で愛情豊かです。";
work="教育やサポート役に向いています。";
break;

case 7:
message="探究心が強く、深い知識を求めます。";
love="慎重ですが深い愛情を持っています。";
work="分析力が高く研究職向きです。";
break;

case 8:
message="成功への意欲が強く、行動力があります。";
love="頼もしく相手を引っ張ります。";
work="経営や営業で力を発揮します。";
break;

case 9:
message="優しく包容力があり、多くの人に慕われます。";
love="大きな愛で相手を包み込みます。";
work="人助けや福祉分野に向いています。";
break;
}

let fortunes=[
"大吉 🎉",
"中吉 😊",
"小吉 ✨",
"吉 🍀",
"末吉 🌟"
];

let today=fortunes[Math.floor(Math.random()*fortunes.length)];

document.getElementById("result").innerHTML=
"<h2>あなたの運命数は "+sum+"</h2>"+
"<p>"+message+"</p>"+
"<h3>💕 恋愛での性格</h3>"+
"<p>"+love+"</p>"+
"<h3>💼 仕事での性格</h3>"+
"<p>"+work+"</p>"+
"<h3>🎴 今日の運勢</h3>"+
"<p>"+today+"</p>";

}

</script>

</body>
</html>
