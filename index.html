<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>無料数秘術占い</title>

<style>
body{
    font-family:sans-serif;
    text-align:center;
    background:#f8f4ff;
    padding-top:50px;
}

h1{
    color:#6a0dad;
}

input{
    width:80px;
    padding:10px;
    font-size:18px;
    text-align:center;
}

button{
    padding:12px 25px;
    font-size:18px;
    margin-top:20px;
    cursor:pointer;
}

#result{
    margin-top:30px;
    font-size:22px;
    line-height:1.8;
}
</style>
</head>

<body>

<h1>無料数秘術占い</h1>

<p>生年月日を入力してください</p>

<input type="number" id="year" placeholder="1990">年
<input type="number" id="month" placeholder="5">月
<input type="number" id="day" placeholder="15">日

<br>

<button onclick="fortune()">占う</button>

<div id="result"></div>

<script>

function fortune(){

let year = document.getElementById("year").value;
let month = document.getElementById("month").value;
let day = document.getElementById("day").value;

if(!year || !month || !day){
    alert("生年月日を入力してください");
    return;
}

let nums = year + month + day;

let sum = 0;

for(let n of nums){
    sum += Number(n);
}

while(sum > 9){
    let temp = 0;

    for(let n of String(sum)){
        temp += Number(n);
    }

    sum = temp;
}

let message = "";

switch(sum){

case 1:
message = "リーダー気質。新しい道を切り開く力があります。";
break;

case 2:
message = "思いやりがあり、人との調和を大切にします。";
break;

case 3:
message = "創造力が豊かで、人を楽しませる才能があります。";
break;

case 4:
message = "努力家でコツコツ積み上げる力があります。";
break;

case 5:
message = "自由を愛し、変化を楽しめるタイプです。";
break;

case 6:
message = "愛情深く、人を支えることが得意です。";
break;

case 7:
message = "探究心が強く、深い知識を求めます。";
break;

case 8:
message = "成功への意欲が強く、行動力があります。";
break;

case 9:
message = "優しく包容力があり、多くの人に慕われます。";
break;
}

document.getElementById("result").innerHTML =
"<h2>あなたの運命数は " + sum + "</h2>" +
"<p>" + message + "</p>";
}

</script>

</body>
</html>
