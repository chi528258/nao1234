<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>無料数秘術占い</title>
<style>
body{
  text-align:center;
  font-family:sans-serif;
  margin-top:50px;
}

input{
  font-size:20px;
  padding:10px;
}

button{
  font-size:20px;
  padding:10px 20px;
  margin-left:10px;
}

#result{
  margin-top:30px;
  font-size:24px;
}
</style>
</head>
<body>

<h1>無料数秘術占い</h1>

<p>あなたの生年月日を入力してください</p>

<input type="date" id="birth">

<button onclick="fortune()">占う</button>

<div id="result"></div>

<script>
function fortune() {

  let birth = document.getElementById("birth").value;

  if(!birth){
    alert("生年月日を入力してください");
    return;
  }

  let nums = birth.replace(/-/g,"");
  let sum = 0;

  for(let n of nums){
    sum += Number(n);
  }

  while(sum > 9){
    let temp = 0;
    for(let n of String(sum)){
      temp += Number(n);
    }
    sum = temp;
  }

  document.getElementById("result").innerHTML =
    "あなたの運命数は " + sum + " です";
}
</script>

</body>
</html>
